// TAB: BUCHUNGSASSISTENT (Claude AI)
// ═══════════════════════════════════════════════════════════════
function AssistentTab({ accounts, setEntries, year }) {
  // ── Single-beleg state ──────────────────────────────────────
  const [mode,       setMode]       = useState("single"); // "single" | "csv"
  const [text,       setText]       = useState("");
  const [file,       setFile]       = useState(null);
  const [fileB64,    setFileB64]    = useState(null);
  const [fileMime,   setFileMime]   = useState(null);
  const [fileName,   setFileName]   = useState("");
  const [loading,    setLoading]    = useState(false);
  const [suggestion, setSuggestion] = useState(null);
  const [booked,     setBooked]     = useState(false);
  const [error,      setError]      = useState("");

  // ── CSV state ──────────────────────────────────────────────
  const [csvRows,    setCsvRows]    = useState([]); // parsed raw rows
  const [csvResults, setCsvResults] = useState([]); // [{...row, suggestion, selected, booked}]
  const [csvLoading, setCsvLoading] = useState(false);
  const [csvDone,    setCsvDone]    = useState(false);

  const accountList = accounts
    .sort((a,b)=>a.number.localeCompare(b.number))
    .map(a=>`${a.number} – ${a.name} (${a.category})`)
    .join("\n");

  const systemPrompt = `Du bist ein Schweizer Vereinsbuchhalter (doppelte Buchhaltung, Schweizer Kontenrahmen).
Verfügbare Konten:
${accountList}

Regeln:
- Bankkonto der Vereinskarte = Konto 1020
- Negative Beträge = Geld fliesst aus Bankkonto heraus → Konto 1020 ist HABEN (Kredit)
- Positive Beträge = Geld fliesst ins Bankkonto → Konto 1020 ist SOLL (Debit)
- Bei privat vorgeschossenen Ausgaben: Haben = 2010 (Kontokorrent mahal)
- Nur Kontonummern verwenden die im Kontenplan vorkommen
- Betrag immer als positive Zahl
- Kein Markdown, nur reines JSON`;

  // ── Single beleg handlers ───────────────────────────────────
  const handleFile = (e) => {
    const f = e.target.files[0]; if(!f) return;
    setFileName(f.name);
    const mime = f.type||(f.name.endsWith(".pdf")?"application/pdf":"image/jpeg");
    setFileMime(mime);
    const reader = new FileReader();
    reader.onload = ev => { setFileB64(ev.target.result.split(",")[1]); setFile(f); };
    reader.readAsDataURL(f);
    e.target.value="";
  };
  const removeFile = () => { setFile(null); setFileB64(null); setFileMime(null); setFileName(""); };

  const analyse = async () => {
    if(!text.trim()&&!fileB64){ setError("Bitte Beleg beschreiben oder Datei hochladen."); return; }
    setError(""); setLoading(true); setSuggestion(null); setBooked(false);
    const userContent = [];
    if(fileB64&&fileMime) {
      userContent.push(fileMime==="application/pdf"
        ? {type:"document",source:{type:"base64",media_type:"application/pdf",data:fileB64}}
        : {type:"image",source:{type:"base64",media_type:fileMime,data:fileB64}});
    }
    userContent.push({type:"text",text: text.trim()||"Analysiere diesen Beleg und schlage eine Buchung vor."});
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST", headers:{"Content-Type":"application/json","x-api-key":ANTHROPIC_API_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:1000,
          system: systemPrompt+"\n\nAntworte NUR mit einem JSON-Objekt:\n{\"date\":\"YYYY-MM-DD\",\"description\":\"...\",\"reference\":\"...\",\"debit\":\"NNNN\",\"credit\":\"NNNN\",\"amount\":0.00,\"reasoning\":\"...\"}",
          messages:[{role:"user",content:userContent}]
        })
      });
      const data = await res.json();
      if(data.error) throw new Error(data.error.message||"API-Fehler");
      const raw = data.content?.map(b=>b.text||"").join("").trim();
      if(!raw) throw new Error("Keine Antwort von der API erhalten");
      const parsed = JSON.parse(raw.replace(/^```json\s*/,"").replace(/```\s*$/,"").trim());
      setSuggestion(parsed);
    } catch(err){ setError("Fehler: "+err.message); }
    setLoading(false);
  };

  const bookSingle = () => {
    if(!suggestion) return;
    setEntries(p=>[...p,{id:Date.now(),date:suggestion.date,description:suggestion.description,
      reference:suggestion.reference||"",debit:suggestion.debit,credit:suggestion.credit,
      amount:Number(suggestion.amount)}]);
    setBooked(true);
  };

  const resetSingle = () => { setText(""); removeFile(); setSuggestion(null); setBooked(false); setError(""); };

  // ── CSV handlers ────────────────────────────────────────────
  const handleCsv = (e) => {
    const f = e.target.files[0]; if(!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const lines = ev.target.result.split(/\r?\n/).filter(Boolean);
      const header = lines[0].split(";").map(h=>h.replace(/"/g,"").trim());
      const rows = lines.slice(1).map(line=>{
        const cols = line.split(";").map(c=>c.replace(/"/g,"").trim());
        const obj = {};
        header.forEach((h,i)=>{ obj[h]=cols[i]||""; });
        return obj;
      }).filter(r=>r.Date&&r.Amount&&r.Amount!=="");
      setCsvRows(rows);
      setCsvResults(rows.map(r=>({...r,suggestion:null,selected:true,booked:false,error:""})));
      setCsvDone(false);
    };
    reader.readAsText(f,"utf-8");
    e.target.value="";
  };

  const analyseCsv = async () => {
    if(!csvRows.length) return;
    setCsvLoading(true);
    // Send all rows to Claude in one call
    const rowsText = csvRows.map((r,i)=>
      `${i+1}. Datum: ${r.Date}, Betrag: ${r.Amount} CHF, Beschreibung: "${r.Description||""}", Verwendungszweck: "${r.Subject||""}", Kategorie: "${r.Category||""}"`
    ).join("\n");

    const prompt = `Analysiere diese ${csvRows.length} Banktransaktionen vom Vereinskonto (Konto 1020 Bankkonto) und schlage für jede eine doppelte Buchung vor.

Transaktionen:
${rowsText}

Antworte NUR mit einem JSON-Array, ein Objekt pro Transaktion in derselben Reihenfolge:
[{"date":"YYYY-MM-DD","description":"kurzer Buchungstext","reference":"","debit":"NNNN","credit":"NNNN","amount":0.00,"reasoning":"kurze Begründung"}]`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST", headers:{"Content-Type":"application/json","x-api-key":ANTHROPIC_API_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:4000,
          system: systemPrompt,
          messages:[{role:"user",content:prompt}]
        })
      });
      const data = await res.json();
      if(data.error) throw new Error(data.error.message||"API-Fehler");
      const raw = data.content?.map(b=>b.text||"").join("").trim();
      if(!raw) throw new Error("Keine Antwort von der API erhalten");
      const parsed = JSON.parse(raw.replace(/^```json\s*/,"").replace(/```\s*$/,"").trim());
      setCsvResults(prev=>prev.map((r,i)=>({...r,suggestion:parsed[i]||null})));
      setCsvDone(true);
    } catch(err){ setError("CSV-Analyse Fehler: "+err.message); }
    setCsvLoading(false);
  };

  const bookSelected = () => {
    const toBook = csvResults.filter(r=>r.selected&&r.suggestion&&!r.booked);
    const newEntries = toBook.map(r=>({
      id: Date.now()+Math.random(),
      date: r.suggestion.date,
      description: r.suggestion.description,
      reference: r.suggestion.reference||"",
      debit: r.suggestion.debit,
      credit: r.suggestion.credit,
      amount: Number(r.suggestion.amount),
    }));
    setEntries(p=>[...p,...newEntries]);
    setCsvResults(prev=>prev.map(r=>r.selected&&r.suggestion&&!r.booked?{...r,booked:true}:r));
  };

  const toggleRow = (i) => setCsvResults(prev=>prev.map((r,j)=>j===i?{...r,selected:!r.selected}:r));
  const toggleAll = (v) => setCsvResults(prev=>prev.map(r=>({...r,selected:v})));
  const updateSugg = (i,k,v) => setCsvResults(prev=>prev.map((r,j)=>j===i?{...r,suggestion:{...r.suggestion,[k]:v}}:r));

  const accName = n => accounts.find(a=>a.number===n)?.name||"—";
  const catColor = {aktiven:"#1D4ED8",passiven:"#15803D",ertrag:"#059669",aufwand:"#DC2626"};
  const accColor = n => { const a=accounts.find(x=>x.number===n); return a?catColor[a.category]:MUTED; };
  const selectedCount = csvResults.filter(r=>r.selected&&r.suggestion&&!r.booked).length;
  const bookedCount   = csvResults.filter(r=>r.booked).length;

  return (
    <div style={{maxWidth:900,margin:"0 auto"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#0F2460,#1e3a8a)",borderRadius:12,
                   padding:"20px 24px",marginBottom:20,color:"white"}}>
        <div style={{fontWeight:800,fontSize:17,letterSpacing:-.3}}>🤖 Buchungsassistent</div>
        <div style={{fontSize:12,opacity:.7,marginTop:4}}>
          Einzelbeleg beschreiben oder hochladen — oder Kontoauszug als CSV importieren
        </div>
      </div>

      {/* Mode switcher */}
      <div style={{display:"flex",gap:0,marginBottom:20,background:"white",borderRadius:8,
                   border:"1px solid #E2E8F0",padding:4,width:"fit-content"}}>
        {[["single","📎 Einzelbeleg"],["csv","📊 CSV-Kontoauszug"]].map(([m,label])=>(
          <button key={m} onClick={()=>setMode(m)} style={{
            padding:"7px 18px",border:"none",borderRadius:6,cursor:"pointer",
            fontSize:13,fontWeight:mode===m?700:400,fontFamily:"inherit",
            background:mode===m?"#0F2460":"transparent",
            color:mode===m?"white":"#64748B",transition:"all .15s"
          }}>{label}</button>
        ))}
      </div>

      {/* ── SINGLE MODE ── */}
      {mode==="single" && !suggestion && !booked && (
        <Card title="Beleg eingeben">
          <Field label="Beleg beschreiben (auf Deutsch)">
            <textarea value={text} onChange={e=>setText(e.target.value)}
              placeholder={"z.B. «Rechnung Raskin Apps vom 31.8.2025, CHF 88'500, Ideation mit Buyout, langfristiges Darlehen»\noder «Wohnsitzbestätigung Stadt Zürich, CHF 20, von mahal privat bezahlt, Belegnr. 391090»"}
              style={{...IS,height:100,resize:"vertical",lineHeight:1.5,fontSize:13}}/>
          </Field>
          <div style={{marginTop:12}}>
            <label style={{display:"block",fontSize:10.5,fontWeight:700,color:"#64748B",
                           marginBottom:6,textTransform:"uppercase",letterSpacing:.6}}>
              Oder Beleg hochladen (PDF / Bild)
            </label>
            {!file ? (
              <label style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,
                             padding:"22px 16px",border:"2px dashed #CBD5E1",borderRadius:8,
                             cursor:"pointer",background:"#F8FAFC",fontSize:13,color:MUTED,
                             transition:"border-color .15s"}}
                onMouseEnter={e=>e.currentTarget.style.borderColor="#0F2460"}
                onMouseLeave={e=>e.currentTarget.style.borderColor="#CBD5E1"}>
                <span style={{fontSize:26}}>📎</span>
                <span>PDF oder Bild hochladen</span>
                <input type="file" accept=".pdf,.jpg,.jpeg,.png,.webp" onChange={handleFile} style={{display:"none"}}/>
              </label>
            ) : (
              <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",
                           background:"#EFF6FF",borderRadius:8,border:"1px solid #BFDBFE"}}>
                <span style={{fontSize:20}}>{fileMime==="application/pdf"?"📄":"🖼"}</span>
                <span style={{fontSize:13,fontWeight:500,flex:1,color:"#1D4ED8"}}>{fileName}</span>
                <button onClick={removeFile} style={{background:"none",border:"none",color:MUTED,cursor:"pointer",fontSize:18}}>×</button>
              </div>
            )}
          </div>
          {error&&<div style={{marginTop:10,padding:"7px 10px",background:"#FEF2F2",borderRadius:5,color:"#DC2626",fontSize:12}}>⚠ {error}</div>}
          <div style={{marginTop:14,display:"flex",justifyContent:"flex-end"}}>
            <button onClick={analyse} disabled={loading}
              style={{...PB,opacity:loading?.6:1,cursor:loading?"wait":"pointer",display:"flex",alignItems:"center",gap:8}}>
              {loading?<><span style={{display:"inline-block",width:14,height:14,border:"2px solid rgba(255,255,255,.3)",borderTop:"2px solid white",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>Analysiere…</>:<>🔍 Beleg analysieren</>}
            </button>
          </div>
        </Card>
      )}

      {mode==="single" && suggestion && !booked && (
        <Card title="Buchungsvorschlag">
          <div style={{padding:"10px 12px",background:"#F0F9FF",borderRadius:7,
                       borderLeft:"3px solid #0284C7",marginBottom:16,fontSize:13,color:"#0369A1"}}>
            💡 {suggestion.reasoning}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:14}}>
            <div><Field label="Datum"><input type="date" value={suggestion.date}
              onChange={e=>setSuggestion(p=>({...p,date:e.target.value}))} style={{...IS,fontSize:13}}/></Field></div>
            <div style={{gridColumn:"span 2"}}><Field label="Buchungstext"><input type="text" value={suggestion.description}
              onChange={e=>setSuggestion(p=>({...p,description:e.target.value}))} style={{...IS,fontSize:13}}/></Field></div>
            <div><Field label="Belegnummer"><input type="text" value={suggestion.reference||""}
              onChange={e=>setSuggestion(p=>({...p,reference:e.target.value}))} style={{...IS,fontSize:13}}/></Field></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 160px",gap:10,marginBottom:16}}>
            <Field label="Soll (Debit)"><AccountSelect accounts={accounts} value={suggestion.debit} onChange={v=>setSuggestion(p=>({...p,debit:v}))}/></Field>
            <Field label="Haben (Kredit)"><AccountSelect accounts={accounts} value={suggestion.credit} onChange={v=>setSuggestion(p=>({...p,credit:v}))}/></Field>
            <Field label="Betrag CHF"><input type="number" step="0.05" value={suggestion.amount}
              onChange={e=>setSuggestion(p=>({...p,amount:e.target.value}))}
              style={{...IS,fontFamily:"'JetBrains Mono',monospace",textAlign:"right",fontSize:15,fontWeight:700}}/></Field>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:"#F8FAFC",borderRadius:8,marginBottom:16}}>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:10,color:MUTED,marginBottom:2}}>SOLL</div>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:800,fontSize:15,color:accColor(suggestion.debit)}}>{suggestion.debit}</span>
              <div style={{fontSize:11,color:"#64748B"}}>{accName(suggestion.debit)}</div>
            </div>
            <div style={{fontSize:20,color:"#CBD5E1",flex:1,textAlign:"center"}}>→</div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:10,color:MUTED,marginBottom:2}}>BETRAG</div>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:800,fontSize:18}}>CHF {fmt(suggestion.amount)}</span>
            </div>
            <div style={{fontSize:20,color:"#CBD5E1",flex:1,textAlign:"center"}}>→</div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:10,color:MUTED,marginBottom:2}}>HABEN</div>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:800,fontSize:15,color:accColor(suggestion.credit)}}>{suggestion.credit}</span>
              <div style={{fontSize:11,color:"#64748B"}}>{accName(suggestion.credit)}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <button onClick={resetSingle} style={SB}>← Neuer Beleg</button>
            <button onClick={bookSingle} style={{...PB,background:"#16A34A",padding:"9px 24px",fontSize:14}}>
              ✓ Buchung ins Journal
            </button>
          </div>
        </Card>
      )}

      {mode==="single" && booked && (
        <div style={{background:"#F0FDF4",border:"2px solid #16A34A",borderRadius:12,padding:"24px",textAlign:"center"}}>
          <div style={{fontSize:36,marginBottom:8}}>✅</div>
          <div style={{fontWeight:800,fontSize:16,color:"#15803D",marginBottom:4}}>Buchung erfasst!</div>
          <div style={{fontSize:13,color:"#64748B",marginBottom:16}}>
            {suggestion.date} · {suggestion.description} · CHF {fmt(suggestion.amount)}
          </div>
          <button onClick={resetSingle} style={{...PB,background:"#15803D"}}>+ Nächsten Beleg</button>
        </div>
      )}

      {/* ── CSV MODE ── */}
      {mode==="csv" && csvRows.length===0 && (
        <Card title="Kontoauszug importieren">
          <div style={{fontSize:13,color:"#64748B",marginBottom:14,lineHeight:1.6}}>
            Unterstütztes Format: <strong>neon CSV-Kontoauszug</strong> (Semikolon-getrennt, Spalten: Date, Amount, Description, Subject, Category…)<br/>
            Claude analysiert alle Transaktionen und schlägt Buchungen vor — du überprüfst und buchst mit einem Klick.
          </div>
          <label style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,
                         padding:"32px 16px",border:"2px dashed #CBD5E1",borderRadius:8,
                         cursor:"pointer",background:"#F8FAFC",fontSize:13,color:MUTED,
                         transition:"border-color .15s"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor="#0F2460"}
            onMouseLeave={e=>e.currentTarget.style.borderColor="#CBD5E1"}>
            <span style={{fontSize:36}}>📊</span>
            <span style={{fontWeight:600,color:"#334155"}}>CSV-Datei hochladen</span>
            <span style={{fontSize:11}}>neon Kontoauszug · Semikolon-getrennt</span>
            <input type="file" accept=".csv" onChange={handleCsv} style={{display:"none"}}/>
          </label>
          {error&&<div style={{marginTop:10,padding:"7px 10px",background:"#FEF2F2",borderRadius:5,color:"#DC2626",fontSize:12}}>⚠ {error}</div>}
        </Card>
      )}

      {mode==="csv" && csvRows.length>0 && (
        <div>
          {/* Toolbar */}
          <div style={{display:"flex",gap:10,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
            <span style={{fontSize:13,color:"#64748B",fontWeight:600}}>
              {csvRows.length} Transaktionen geladen
            </span>
            {bookedCount>0&&<span style={{background:"#F0FDF4",color:"#15803D",padding:"2px 9px",borderRadius:999,fontSize:11,fontWeight:600}}>✓ {bookedCount} gebucht</span>}
            <div style={{flex:1}}/>
            <button onClick={()=>{setCsvRows([]);setCsvResults([]);setCsvDone(false);setError("");}} style={SB}>
              × Neue CSV
            </button>
            {!csvDone&&(
              <button onClick={analyseCsv} disabled={csvLoading}
                style={{...PB,display:"flex",alignItems:"center",gap:8,opacity:csvLoading?.6:1}}>
                {csvLoading
                  ?<><span style={{display:"inline-block",width:14,height:14,border:"2px solid rgba(255,255,255,.3)",borderTop:"2px solid white",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>Analysiere {csvRows.length} Buchungen…</>
                  :<>🔍 Alle analysieren</>}
              </button>
            )}
            {csvDone&&selectedCount>0&&(
              <button onClick={bookSelected}
                style={{...PB,background:"#16A34A",display:"flex",alignItems:"center",gap:6}}>
                ✓ {selectedCount} ausgewählte buchen
              </button>
            )}
          </div>

          {/* Table */}
          <div style={{background:"white",borderRadius:10,border:"1px solid #E2E8F0",overflow:"auto",boxShadow:"0 1px 3px rgba(0,0,0,.05)"}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:900}}>
              <thead>
                <tr>
                  <Th style={{width:36}}>
                    <input type="checkbox"
                      checked={csvResults.filter(r=>!r.booked).every(r=>r.selected)}
                      onChange={e=>toggleAll(e.target.checked)}/>
                  </Th>
                  <Th style={{width:96}}>Datum</Th>
                  <Th align="right" style={{width:90}}>Betrag</Th>
                  <Th>Beschreibung</Th>
                  <Th style={{width:80}}>Soll</Th>
                  <Th style={{width:80}}>Haben</Th>
                  <Th align="right" style={{width:90}}>CHF</Th>
                  <Th style={{width:180}}>Buchungstext</Th>
                  <Th style={{width:50}}/>
                </tr>
              </thead>
              <tbody>
                {csvResults.map((r,i)=>{
                  const s = r.suggestion;
                  const isBooked = r.booked;
                  return (
                    <tr key={i} style={{
                      opacity: isBooked?.5:1,
                      background: isBooked?"#F0FDF4":r.selected?"white":"#FAFAFA"
                    }}>
                      <Td>
                        {isBooked
                          ? <span style={{color:"#15803D",fontWeight:700,fontSize:13}}>✓</span>
                          : <input type="checkbox" checked={r.selected} onChange={()=>toggleRow(i)}/>}
                      </Td>
                      <Td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#475569"}}>
                        {s?.date||r.Date}
                      </Td>
                      <Td align="right" style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,
                        fontWeight:600,color:Number(r.Amount)<0?"#DC2626":"#059669"}}>
                        {r.Amount}
                      </Td>
                      <Td style={{fontSize:12,color:"#334155"}}>
                        <div style={{fontWeight:500}}>{r.Description}</div>
                        {r.Subject&&<div style={{fontSize:10,color:MUTED}}>{r.Subject}</div>}
                      </Td>
                      {s ? (
                        <>
                          <Td>
                            <select value={s.debit} onChange={e=>updateSugg(i,"debit",e.target.value)}
                              style={{...IS,padding:"3px 6px",fontSize:11,fontFamily:"'JetBrains Mono',monospace",
                                      fontWeight:700,color:accColor(s.debit),width:75}}>
                              {accounts.sort((a,b)=>a.number.localeCompare(b.number)).map(a=>(
                                <option key={a.number} value={a.number}>{a.number}</option>
                              ))}
                            </select>
                          </Td>
                          <Td>
                            <select value={s.credit} onChange={e=>updateSugg(i,"credit",e.target.value)}
                              style={{...IS,padding:"3px 6px",fontSize:11,fontFamily:"'JetBrains Mono',monospace",
                                      fontWeight:700,color:accColor(s.credit),width:75}}>
                              {accounts.sort((a,b)=>a.number.localeCompare(b.number)).map(a=>(
                                <option key={a.number} value={a.number}>{a.number}</option>
                              ))}
                            </select>
                          </Td>
                          <Td align="right" style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:600}}>
                            {fmt(s.amount)}
                          </Td>
                          <Td>
                            <input value={s.description} onChange={e=>updateSugg(i,"description",e.target.value)}
                              style={{...IS,padding:"3px 6px",fontSize:11,width:"100%"}}/>
                          </Td>
                        </>
                      ) : (
                        <td colSpan={4} style={{padding:"8px 12px",fontSize:11,color:MUTED,fontStyle:"italic"}}>
                          {csvLoading?"Wird analysiert…":"—"}
                        </td>
                      )}
                      <Td>
                        {s&&!isBooked&&(
                          <div style={{fontSize:10,color:MUTED,lineHeight:1.3}} title={s.reasoning}>
                            ℹ️
                          </div>
                        )}
                      </Td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {csvDone&&(
            <div style={{marginTop:10,fontSize:12,color:"#64748B",textAlign:"center"}}>
              Hover über ℹ️ für Begründung · Soll/Haben und Buchungstext direkt in der Tabelle editierbar
            </div>
          )}
        </div>
      )}

      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════
function App() {
  const [accounts, setAccounts] = useState(DEFAULT_ACCOUNTS);
  const [entries,  setEntries]  = useState([]);
  const [tab,      setTab]      = useState("journal");
  const [year,     setYear]     = useState(2025);
  const [loaded,   setLoaded]   = useState(false);
  const [saving,   setSaving]   = useState(false);

  // ── Load from localStorage ────────────────────────────────
  useEffect(()=>{
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const d = JSON.parse(raw);
        if(d.accounts) setAccounts(d.accounts);
        if(d.entries)  setEntries(d.entries);
        if(d.year)     setYear(d.year);
      }
    } catch(e) { /* first run */ }
    setLoaded(true);
  },[]);

  // ── Auto-save (debounced 600ms) ───────────────────────────
  useEffect(()=>{
    if(!loaded) return;
    setSaving(true);
    const t = setTimeout(()=>{
      try { localStorage.setItem(STORAGE_KEY,JSON.stringify({accounts,entries,year})); }
      catch(e){ console.error("Storage error:",e); }
      setSaving(false);
    },600);
    return ()=>clearTimeout(t);
  },[accounts,entries,year,loaded]);

  // ── Account saldo ─────────────────────────────────────────
  const getSaldo = useCallback((num, filterYear=null)=>{
    const acc = accounts.find(a=>a.number===num);
    if(!acc) return 0;
    const ents = filterYear ? entries.filter(e=>e.date.startsWith(String(filterYear))) : entries;
    const d = ents.filter(e=>e.debit===num).reduce((s,e)=>s+Number(e.amount),0);
    const c = ents.filter(e=>e.credit===num).reduce((s,e)=>s+Number(e.amount),0);
    return (acc.category==="aktiven"||acc.category==="aufwand") ? d-c : c-d;
  },[accounts,entries]);

  const TABS = [
    { id:"journal",   label:"📝 Journal"        },
    { id:"kontenplan",label:"📋 Kontenplan"      },
    { id:"hauptbuch", label:"📖 Hauptbuch"       },
    { id:"bilanz",    label:"⚖️ Bilanz"          },
    { id:"erfolg",    label:"📊 Erfolgsrechnung" },
    { id:"assistent",  label:"🤖 Buchungsassistent" },
  ];

  if(!loaded) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",
                 height:"100vh",fontFamily:"sans-serif",color:MUTED,fontSize:14}}>
      Lade Buchhaltungsdaten …
    </div>
  );

  return (
    <div style={{fontFamily:"'Outfit',sans-serif",minHeight:"100vh",background:"#F1F5F9"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
        *{box-sizing:border-box;}
        .hover-row:hover td{background:rgba(15,36,96,.03)!important;}
        input:focus,select:focus{border-color:#0F2460!important;box-shadow:0 0 0 3px rgba(15,36,96,.1)!important;outline:none;}
        ::-webkit-scrollbar{width:6px;height:6px;}
        ::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px;}
        @media print{
          .no-print{display:none!important;}
          body,#root>div{background:white!important;}
          .hover-row:hover td{background:transparent!important;}
        }
      `}</style>

      {/* ── Header ── */}
      <div className="no-print"
        style={{background:"linear-gradient(135deg,#0F2460 0%,#1a3a80 100%)",
                color:"white",padding:"0 24px",
                boxShadow:"0 2px 12px rgba(15,36,96,.25)"}}>
        <div style={{maxWidth:1200,margin:"0 auto",display:"flex",
                     alignItems:"center",justifyContent:"space-between",height:62}}>
          <div>
            <div style={{fontSize:9.5,letterSpacing:3.5,textTransform:"uppercase",
                         opacity:.5,marginBottom:2}}>
              Doppelte Buchhaltung · Schweizer Vereins-Kontenrahmen · FJ {year}
            </div>
            <div style={{fontSize:21,fontWeight:800,letterSpacing:-.5}}>Verein Werckmeister</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            {saving&&<span style={{fontSize:11,opacity:.45,fontStyle:"italic"}}>Speichere…</span>}
            <span style={{fontSize:11,opacity:.55}}>Geschäftsjahr</span>
            <select value={year} onChange={e=>setYear(Number(e.target.value))}
              style={{background:"rgba(255,255,255,.13)",color:"white",
                      border:"1px solid rgba(255,255,255,.3)",borderRadius:7,
                      padding:"5px 12px",fontSize:14,fontWeight:700,fontFamily:"inherit",cursor:"pointer"}}>
              {[2023,2024,2025,2026,2027].map(y=>(
                <option key={y} value={y} style={{color:"#0F2460",background:"white"}}>{y}</option>
              ))}
            </select>
          </div>
        </div>
      </div>

      {/* ── Tab bar ── */}
      <div className="no-print"
        style={{background:"#0C1D52",borderBottom:"3px solid #F1F5F9"}}>
        <div style={{maxWidth:1200,margin:"0 auto",display:"flex",padding:"0 24px"}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              padding:"11px 18px",border:"none",cursor:"pointer",
              fontSize:13,fontWeight:tab===t.id?700:400,
              fontFamily:"inherit",letterSpacing:.1,
              background:tab===t.id?"#F1F5F9":"transparent",
              color:tab===t.id?"#0F2460":"rgba(255,255,255,.6)",
              borderRadius:tab===t.id?"8px 8px 0 0":4,
              transition:"all .15s",
            }}>{t.label}</button>
          ))}
        </div>
      </div>

      {/* ── Content ── */}
      <div style={{maxWidth:1200,margin:"0 auto",padding:24}}>
        {tab==="journal"    && <JournalTab    accounts={accounts} setAccounts={setAccounts}
                                               entries={entries}   setEntries={setEntries}  year={year}/>}
        {tab==="kontenplan" && <KontenplanTab  accounts={accounts} setAccounts={setAccounts}
                                               entries={entries}   getSaldo={getSaldo} year={year}/>}
        {tab==="hauptbuch"  && <HauptbuchTab   accounts={accounts} entries={entries}         year={year}/>}
        {tab==="bilanz"     && <BilanzTab       accounts={accounts} getSaldo={getSaldo}       year={year}/>}
        {tab==="erfolg"     && <ErfolgsrechnungTab accounts={accounts} getSaldo={getSaldo}    year={year}/>}
        {tab==="assistent"  && <AssistentTab accounts={accounts} setEntries={setEntries} year={year}/>}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
