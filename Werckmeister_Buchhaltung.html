const fmt = (n) =>

// Real file download for standalone HTML
const dlFile = (content, filename) => {
  const bom = "\uFEFF";
  const blob = new Blob([bom + content], { type: "text/plain;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

// Word-Export: Erzeugt eine .docx-Datei aus HTML-Inhalt (kompatibel mit Word & Google Docs)
const exportWord = (htmlContent, filename) => {
  const doc = `<html xmlns:o="urn:schemas-microsoft-com:office:office"
    xmlns:w="urn:schemas-microsoft-com:office:word"
    xmlns="http://www.w3.org/TR/REC-html40">
    <head><meta charset="utf-8">
    <style>
      body { font-family: Calibri, Arial, sans-serif; font-size: 11pt; color: #0F172A; }
      table { border-collapse: collapse; width: 100%; margin-bottom: 8pt; }
      th, td { border: 1px solid #CBD5E1; padding: 1pt 4pt; font-size: 10pt; }
      th { background: #F1F5F9; font-weight: 700; text-transform: uppercase; font-size: 9pt; color: #475569; }
      .section-header { background: #F8FAFC; font-weight: 700; font-size: 9pt; color: #64748B;
                         text-transform: uppercase; letter-spacing: 0.5pt; }
      .subtotal { font-style: italic; color: #3A3A3A; font-size: 9.5pt; }
      .total-row { font-weight: 800; font-size: 11pt; }
      .total-row td { border-top: 2pt solid currentColor; }
      .amount { text-align: right; font-family: 'Courier New', monospace; }
      .center { text-align: center; }
      .muted { color: #3A3A3A; }
      h1 { font-size: 16pt; text-align: center; margin-bottom: 2pt; }
      h2 { font-size: 11pt; text-align: center; color: #64748B; margin-bottom: 8pt; }
    </style></head><body>${htmlContent}</body></html>`;
  const blob = new Blob(["\uFEFF" + doc], {
    type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
  });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

// ═══════════════════════════════════════════════════════════════
// TAB: JOURNAL
// ═══════════════════════════════════════════════════════════════
function JournalTab({ accounts, setAccounts, entries, setEntries, year }) {
  const blank = { date:`${year}-01-01`, description:"", debit:"", credit:"", amount:"", reference:"" };
  const [form,    setForm]    = useState(blank);
  const [error,   setError]   = useState("");
  const [filterY, setFilterY] = useState(true);
  const [sortDir, setSortDir] = useState("desc");
  const [editing, setEditing] = useState(null); // {id, date, description, reference, debit, credit, amount}
  const [editErr, setEditErr] = useState("");

  const f = (k,v) => setForm(p=>({...p,[k]:v}));

  const startEdit = (e) => setEditing({ ...e, amount: String(e.amount) });
  const cancelEdit = () => { setEditing(null); setEditErr(""); };
  const saveEdit = () => {
    if(!editing.date||!editing.description||!editing.debit||!editing.credit||!editing.amount){
      setEditErr("Pflichtfelder: Datum, Text, Soll, Haben, Betrag."); return; }
    if(editing.debit===editing.credit){ setEditErr("Soll ≠ Haben."); return; }
    const amt = parseFloat(String(editing.amount).replace(",","."));
    if(isNaN(amt)||amt<=0){ setEditErr("Betrag muss > 0 sein."); return; }
    setEntries(p=>p.map(e=>e.id===editing.id?{...editing,amount:amt}:e));
    setEditing(null); setEditErr("");
  };
  const ef = (k,v) => setEditing(p=>({...p,[k]:v}));

  const visible = useMemo(()=>{
    const arr = filterY ? entries.filter(e=>e.date.startsWith(String(year))) : [...entries];
    return arr.sort((a,b)=> sortDir==="desc"
      ? b.date.localeCompare(a.date)||b.id-a.id
      : a.date.localeCompare(b.date)||a.id-b.id);
  },[entries,year,filterY,sortDir]);

  const add = () => {
    if(!form.date||!form.description||!form.debit||!form.credit||!form.amount){
      setError("Pflichtfelder: Datum, Text, Soll, Haben, Betrag."); return; }
    if(form.debit===form.credit){ setError("Soll ≠ Haben."); return; }
    const amt = parseFloat(form.amount.replace(",","."));
    if(isNaN(amt)||amt<=0){ setError("Betrag muss > 0 sein."); return; }
    setEntries(p=>[...p,{ id:Date.now(), ...form, amount:amt }]);
    setForm(p=>({...p, description:"", amount:"", reference:""}));
    setError("");
  };

  const [confirmDel, setConfirmDel] = useState(null);
  const del = (id) => setConfirmDel(id);
  const confirmDelete = () => { setEntries(p=>p.filter(e=>e.id!==confirmDel)); setConfirmDel(null); setEditing(null); };

  const exportCSV = () => {
    const h = ["Datum","Belegnr.","Buchungstext","Soll-Nr.","Soll-Konto","Haben-Nr.","Haben-Konto","Betrag CHF"];
    const rows = visible.map(e=>[
      e.date, e.reference||"", e.description,
      e.debit, accounts.find(a=>a.number===e.debit)?.name||"",
      e.credit, accounts.find(a=>a.number===e.credit)?.name||"",
      e.amount.toFixed(2).replace(".",","),
    ]);
    dlFile([h,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(";")).join("\r\n"),
      `Werckmeister_Journal_${year}.csv`);
  };

  const exportJSON = () => {
    dlFile(JSON.stringify({ verein:"Werckmeister", exportDate:new Date().toISOString(),
      year, accounts, entries },null,2),
      `Werckmeister_Backup_${new Date().toISOString().slice(0,10)}.json`);
  };

  const importJSON = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if(d.accounts) setAccounts(d.accounts);
        if(d.entries)  setEntries(d.entries);
        alert("✓ Backup importiert!");
      } catch { alert("Fehler: Ungültige JSON-Datei."); }
    };
    r.readAsText(file); e.target.value="";
  };

  const total = visible.reduce((s,e)=>s+Number(e.amount),0);
  const accName = (n) => accounts.find(a=>a.number===n)?.name||"";

  return (
    <div>
      <Card title="Neue Buchung erfassen">
        <div style={{ display:"grid", gridTemplateColumns:"150px 1fr 130px 120px", gap:10 }}>
          <Field label="Datum *">
            <input type="date" value={form.date} onChange={e=>f("date",e.target.value)} style={IS} />
          </Field>
          <Field label="Buchungstext *">
            <input type="text" value={form.description}
              onChange={e=>f("description",e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&add()}
              placeholder="z. B. Mitgliederbeitrag Meyer" style={IS} />
          </Field>
          <Field label="Belegnummer">
            <input type="text" value={form.reference} onChange={e=>f("reference",e.target.value)}
              placeholder="RE-001" style={IS} />
          </Field>
          <Field label="Betrag CHF *">
            <input type="number" step="0.05" min="0.01" value={form.amount}
              onChange={e=>f("amount",e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&add()}
              placeholder="0.00"
              style={{...IS,fontFamily:"'JetBrains Mono',monospace",textAlign:"right"}} />
          </Field>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr auto", gap:10, marginTop:10, alignItems:"end" }}>
          <Field label="Soll (Debit) *">
            <AccountSelect accounts={accounts} value={form.debit} onChange={v=>f("debit",v)} />
          </Field>
          <Field label="Haben (Kredit) *">
            <AccountSelect accounts={accounts} value={form.credit} onChange={v=>f("credit",v)} />
          </Field>
          <button onClick={add} style={{...PB,height:38}}>+ Buchen</button>
        </div>
        {error && (
          <div style={{color:"#DC2626",marginTop:8,fontSize:12,padding:"6px 10px",
                       background:"#FEF2F2",borderRadius:5}}>⚠ {error}</div>
        )}
      </Card>

      {/* Action bar */}
      <div className="no-print" style={{display:"flex",gap:10,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
        <label style={{display:"flex",alignItems:"center",gap:5,fontSize:13,color:"#555",cursor:"pointer"}}>
          <input type="checkbox" checked={filterY} onChange={e=>setFilterY(e.target.checked)}/>
          Nur {year}
        </label>
        <button onClick={()=>setSortDir(d=>d==="desc"?"asc":"desc")} style={SB}>
          {sortDir==="desc"?"↓ Neueste":"↑ Älteste"}
        </button>
        <div style={{flex:1}}/>
        <span style={{fontSize:12,color:MUTED}}>{visible.length} Buchungen</span>
        <button onClick={exportCSV} style={SB}>📥 CSV Export</button>
        <button onClick={exportJSON} style={SB}>💾 JSON Backup</button>
        <label style={{...SB,cursor:"pointer",display:"inline-flex",alignItems:"center"}}>
          📤 Restore
          <input type="file" accept=".json" onChange={importJSON} style={{display:"none"}}/>
        </label>
      </div>

      {/* Table */}
      <div style={{background:"white",borderRadius:10,border:"1px solid #E2E8F0",
                   overflow:"auto",boxShadow:"0 1px 3px rgba(0,0,0,.05)"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead>
            <tr>
              <Th>Datum</Th>
              <Th>Belegnr.</Th>
              <Th>Buchungstext</Th>
              <Th>Soll</Th>
              <Th>Haben</Th>
              <Th align="right">Betrag CHF</Th>
              <Th className="no-print"/>
            </tr>
          </thead>
          <tbody>
            {visible.length===0 ? (
              <tr><td colSpan={7} style={{padding:36,textAlign:"center",color:MUTED,fontStyle:"italic"}}>
                Noch keine Buchungen — erfasse deine erste Buchung oben.
              </td></tr>
            ) : visible.map(e=>{
              const isEditing = editing?.id===e.id;
              if(isEditing) return (
                <tr key={e.id} style={{background:"#FEFCE8",outline:"2px solid #F59E0B",outlineOffset:"-2px"}}>
                  <Td>
                    <input type="date" value={editing.date} onChange={ev=>ef("date",ev.target.value)}
                      style={{...IS,padding:"4px 6px",fontSize:12,width:130,borderColor:"#F59E0B"}}/>
                  </Td>
                  <Td>
                    <input type="text" value={editing.reference} onChange={ev=>ef("reference",ev.target.value)}
                      placeholder="—" style={{...IS,padding:"4px 6px",fontSize:12,width:90,borderColor:"#F59E0B"}}/>
                  </Td>
                  <Td>
                    <input type="text" value={editing.description} onChange={ev=>ef("description",ev.target.value)}
                      onKeyDown={ev=>{if(ev.key==="Enter")saveEdit();if(ev.key==="Escape")cancelEdit();}}
                      autoFocus style={{...IS,padding:"4px 6px",fontSize:13,borderColor:"#F59E0B",
                                       boxShadow:"0 0 0 3px rgba(245,158,11,.15)"}}/>
                  </Td>
                  <Td>
                    <AccountSelect accounts={accounts} value={editing.debit} onChange={v=>ef("debit",v)}/>
                  </Td>
                  <Td>
                    <AccountSelect accounts={accounts} value={editing.credit} onChange={v=>ef("credit",v)}/>
                  </Td>
                  <Td align="right">
                    <input type="number" step="0.05" value={editing.amount} onChange={ev=>ef("amount",ev.target.value)}
                      onKeyDown={ev=>{if(ev.key==="Enter")saveEdit();if(ev.key==="Escape")cancelEdit();}}
                      style={{...IS,padding:"4px 6px",fontFamily:"'JetBrains Mono',monospace",
                              textAlign:"right",fontSize:13,width:110,borderColor:"#F59E0B"}}/>
                  </Td>
                  <Td className="no-print" align="right">
                    <div style={{display:"flex",gap:4,justifyContent:"flex-end",flexWrap:"wrap"}}>
                      {editErr&&<span style={{fontSize:10,color:"#DC2626",width:"100%",textAlign:"right"}}>{editErr}</span>}
                      <button onClick={saveEdit}
                        style={{...PB,padding:"4px 10px",fontSize:12,background:"#16A34A"}}
                        title="Speichern (Enter)">✓</button>
                      <button onClick={cancelEdit}
                        style={{...SB,padding:"4px 10px",fontSize:12}}
                        title="Abbrechen (Esc)">✕</button>
                      {confirmDel!==e.id
                        ? <button onClick={()=>del(e.id)}
                            style={{...SB,padding:"4px 10px",fontSize:12,borderColor:"#FECACA",color:"#EF4444"}}
                            title="Buchung löschen">🗑</button>
                        : <>
                            <span style={{fontSize:10,color:"#DC2626",alignSelf:"center",fontWeight:600}}>Sicher?</span>
                            <button onClick={confirmDelete} style={{...PB,padding:"4px 8px",fontSize:11,background:"#DC2626"}}>Ja</button>
                            <button onClick={()=>setConfirmDel(null)} style={{...SB,padding:"4px 8px",fontSize:11}}>Nein</button>
                          </>
                      }
                    </div>
                  </Td>
                </tr>
              );
              return (
              <tr key={e.id} className="hover-row">
                <Td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#475569"}}>{e.date}</Td>
                <Td style={{color:MUTED,fontSize:12}}>{e.reference||"—"}</Td>
                <Td>{e.description}</Td>
                <Td>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,
                                fontWeight:700,color:"#1D4ED8"}}>{e.debit}</span>
                  <span style={{color:MUTED,fontSize:11,marginLeft:5}}>{accName(e.debit)}</span>
                </Td>
                <Td>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,
                                fontWeight:700,color:"#059669"}}>{e.credit}</span>
                  <span style={{color:MUTED,fontSize:11,marginLeft:5}}>{accName(e.credit)}</span>
                </Td>
                <Td align="right" style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:500}}>{fmt(e.amount)}</Td>
                <Td className="no-print" align="right">
                  <div style={{display:"flex",gap:4,justifyContent:"flex-end"}}>
                    <button onClick={()=>startEdit(e)}
                      style={{background:"none",border:"none",color:"#CBD5E1",cursor:"pointer",
                              fontSize:14,lineHeight:1,transition:"color .15s",padding:"2px 4px"}}
                      onMouseEnter={ev=>ev.currentTarget.style.color="#F59E0B"}
                      onMouseLeave={ev=>ev.currentTarget.style.color="#CBD5E1"}
                      title="Bearbeiten">✏</button>
                    {confirmDel!==e.id
                      ? <button onClick={()=>del(e.id)}
                          style={{background:"none",border:"none",color:"#CBD5E1",cursor:"pointer",
                                  fontSize:16,lineHeight:1,transition:"color .15s",padding:"2px 4px"}}
                          onMouseEnter={ev=>ev.target.style.color="#EF4444"}
                          onMouseLeave={ev=>ev.target.style.color="#CBD5E1"}
                          title="Löschen">×</button>
                      : <div style={{display:"flex",gap:3,alignItems:"center"}}>
                          <span style={{fontSize:10,color:"#DC2626",fontWeight:600}}>Sicher?</span>
                          <button onClick={confirmDelete} style={{...PB,padding:"2px 7px",fontSize:11,background:"#DC2626"}}>Ja</button>
                          <button onClick={()=>setConfirmDel(null)} style={{...SB,padding:"2px 7px",fontSize:11}}>Nein</button>
                        </div>
                    }
                  </div>
                </Td>
              </tr>
              );
            })}
          </tbody>
          {visible.length>0 && (
            <tfoot>
              <tr style={{background:"#F8FAFC"}}>
                <td colSpan={5} style={{padding:"10px 12px",fontWeight:700,fontSize:13,
                                        borderTop:"2px solid #E2E8F0"}}>
                  Total {filterY?year:"alle"} ({visible.length} Buchungen)
                </td>
                <td style={{padding:"10px 12px",textAlign:"right",
                             fontFamily:"'JetBrains Mono',monospace",fontWeight:700,fontSize:14,
                             borderTop:"2px solid #E2E8F0",color:"#0F172A"}}>
                  {fmt(total)}
                </td>
                <td className="no-print" style={{borderTop:"2px solid #E2E8F0"}}/>
              </tr>
            </tfoot>
          )}
        </table>
      </div>
    </div>
  );
}

// TAB: KONTENPLAN
// ═══════════════════════════════════════════════════════════════
function KontenplanTab({ accounts, setAccounts, entries, getSaldo, year }) {
  const [form,    setForm]    = useState({number:"",name:"",category:"aktiven",group:""});
  const [error,   setError]   = useState("");
  const [open,    setOpen]    = useState(false);
  const [editing, setEditing] = useState(null); // { number, name, group }
  const [editErr, setEditErr] = useState("");
  const [confirmDel, setConfirmDel] = useState(null); // account number pending deletion

  const f = (k,v) => setForm(p=>({...p,[k]:v}));

  const addAccount = () => {
    if(!form.number.trim()||!form.name.trim()){ setError("Kontonummer und Name sind Pflicht."); return; }
    if(accounts.find(a=>a.number===form.number.trim())){
      setError(`Kontonummer ${form.number} existiert bereits.`); return; }
    setAccounts(p=>[...p,{...form,number:form.number.trim(),name:form.name.trim()}]
      .sort((a,b)=>a.number.localeCompare(b.number)));
    setForm({number:"",name:"",category:"aktiven",group:""});
    setError(""); setOpen(false);
  };

  const delAccount = (n) => {
    if(window.confirm(`Konto ${n} löschen? Buchungen bleiben erhalten.`))
      setAccounts(p=>p.filter(a=>a.number!==n));
  };

  const startEdit = (a) => {
    setEditing({ number:a.number, name:a.name, group:a.group||"" });
    setEditErr("");
  };

  const saveEdit = () => {
    if(!editing.name.trim()){ setEditErr("Bezeichnung darf nicht leer sein."); return; }
    setAccounts(p => p.map(a =>
      a.number===editing.number
        ? { ...a, name:editing.name.trim(), group:editing.group.trim() }
        : a
    ));
    setEditing(null); setEditErr("");
  };

  const cancelEdit = () => { setEditing(null); setEditErr(""); };

  const hasBookings = (num) => entries.some(e=>e.debit===num||e.credit===num);

  const delEditingAccount = (num) => { setConfirmDel(num); };

  const confirmDelAccount = () => {
    setAccounts(p=>p.filter(a=>a.number!==confirmDel));
    setEditing(null);
    setConfirmDel(null);
  };

  const catCfg = {
    aktiven: {label:"AKTIVEN",   color:"#1D4ED8", bg:"#EFF6FF", border:"#BFDBFE"},
    passiven:{label:"PASSIVEN",  color:"#15803D", bg:"#F0FDF4", border:"#BBF7D0"},
    ertrag:  {label:"ERTRÄGE",   color:"#059669", bg:"#ECFDF5", border:"#A7F3D0"},
    aufwand: {label:"AUFWÄNDE",  color:"#DC2626", bg:"#FEF2F2", border:"#FECACA"},
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <span style={{fontSize:13,color:"#64748B"}}>{accounts.length} Konten · Kontenrahmen {year}</span>
        <button onClick={()=>setOpen(s=>!s)} style={PB}>{open?"Abbrechen":"+ Neues Konto"}</button>
      </div>

      {open && (
        <Card title="Neues Konto anlegen">
          <div style={{display:"grid",gridTemplateColumns:"110px 1fr 150px 1fr auto",gap:10,alignItems:"end"}}>
            <Field label="Konto-Nr. *">
              <input type="text" value={form.number} onChange={e=>f("number",e.target.value)}
                placeholder="z.B. 3600" style={IS}/>
            </Field>
            <Field label="Bezeichnung *">
              <input type="text" value={form.name} onChange={e=>f("name",e.target.value)}
                placeholder="Kontoname" style={IS}/>
            </Field>
            <Field label="Kategorie *">
              <select value={form.category} onChange={e=>f("category",e.target.value)} style={IS}>
                <option value="aktiven">Aktiven</option>
                <option value="passiven">Passiven</option>
                <option value="ertrag">Ertrag</option>
                <option value="aufwand">Aufwand</option>
              </select>
            </Field>
            <Field label="Gruppe">
              <input type="text" value={form.group} onChange={e=>f("group",e.target.value)}
                placeholder="z.B. Vereinserträge" style={IS}/>
            </Field>
            <button onClick={addAccount} style={{...PB,height:38}}>Anlegen</button>
          </div>
          {error && <div style={{color:"#DC2626",marginTop:8,fontSize:12}}>⚠ {error}</div>}
        </Card>
      )}

      {editErr && (
        <div style={{color:"#DC2626",marginBottom:10,fontSize:12,padding:"6px 10px",
                     background:"#FEF2F2",borderRadius:5}}>⚠ {editErr}</div>
      )}

      {["aktiven","passiven","ertrag","aufwand"].map(cat => {
        const accs = accounts.filter(a=>a.category===cat).sort((a,b)=>a.number.localeCompare(b.number));
        if(!accs.length) return null;
        const cfg = catCfg[cat];
        const total = accs.reduce((s,a)=>s+getSaldo(a.number,year),0);
        return (
          <div key={cat} style={{marginBottom:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontWeight:800,fontSize:11,color:cfg.color,letterSpacing:1.5}}>
                {cfg.label}
              </span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,
                            fontWeight:600,color:cfg.color}}>
                Total: CHF {fmt(total)}
              </span>
            </div>
            <div style={{background:"white",borderRadius:8,border:"1px solid #E2E8F0",overflow:"hidden"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead>
                  <tr>
                    <Th style={{width:80}}>Kto-Nr.</Th>
                    <Th>Bezeichnung</Th>
                    <Th style={{width:200}}>Gruppe</Th>
                    <Th align="right" style={{width:140}}>Saldo {year}</Th>
                    <Th className="no-print" style={{width:90}}/>
                  </tr>
                </thead>
                <tbody>
                  {accs.map(a => {
                    const saldo = getSaldo(a.number,year);
                    const isEditing = editing?.number === a.number;

                    if(isEditing) return (
                      <tr key={a.number} style={{background:"#FEFCE8",outline:"2px solid #F59E0B",
                                                  outlineOffset:"-2px"}}>
                        <Td style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,
                                    color:cfg.color,fontSize:12}}>{a.number}</Td>
                        <Td>
                          <input
                            autoFocus
                            type="text"
                            value={editing.name}
                            onChange={e=>setEditing(p=>({...p,name:e.target.value}))}
                            onKeyDown={e=>{ if(e.key==="Enter") saveEdit(); if(e.key==="Escape") cancelEdit(); }}
                            style={{...IS,padding:"5px 8px",fontSize:13,fontWeight:500,
                                    borderColor:"#F59E0B",boxShadow:"0 0 0 3px rgba(245,158,11,.15)"}}
                          />
                        </Td>
                        <Td>
                          <input
                            type="text"
                            value={editing.group}
                            onChange={e=>setEditing(p=>({...p,group:e.target.value}))}
                            onKeyDown={e=>{ if(e.key==="Enter") saveEdit(); if(e.key==="Escape") cancelEdit(); }}
                            placeholder="Gruppe…"
                            style={{...IS,padding:"5px 8px",fontSize:13,
                                    borderColor:"#F59E0B",boxShadow:"0 0 0 3px rgba(245,158,11,.15)"}}
                          />
                        </Td>
                        <Td align="right" style={{fontFamily:"'JetBrains Mono',monospace",
                                                   color:"#CBD5E1",fontSize:13}}>
                          {saldo!==0?fmt(saldo):"—"}
                        </Td>
                        <Td className="no-print" align="right">
                          <div style={{display:"flex",gap:4,justifyContent:"flex-end"}}>
                            <button onClick={saveEdit}
                              style={{...PB,padding:"4px 10px",fontSize:12,background:"#16A34A"}}
                              title="Speichern (Enter)">✓</button>
                            <button onClick={cancelEdit}
                              style={{...SB,padding:"4px 10px",fontSize:12}}
                              title="Abbrechen (Esc)">✕</button>
                            {!hasBookings(a.number) && confirmDel!==a.number && (
                              <button onClick={()=>delEditingAccount(a.number)}
                                style={{...SB,padding:"4px 10px",fontSize:12,
                                        borderColor:"#FECACA",color:"#EF4444"}}
                                title="Konto löschen (keine Buchungen vorhanden)">🗑</button>
                            )}
                            {!hasBookings(a.number) && confirmDel===a.number && (
                              <>
                                <span style={{fontSize:11,color:"#DC2626",whiteSpace:"nowrap",
                                              alignSelf:"center",fontWeight:600}}>Sicher?</span>
                                <button onClick={confirmDelAccount}
                                  style={{...PB,padding:"4px 10px",fontSize:12,background:"#DC2626"}}>
                                  Ja, löschen
                                </button>
                                <button onClick={()=>setConfirmDel(null)}
                                  style={{...SB,padding:"4px 10px",fontSize:12}}>
                                  Nein
                                </button>
                              </>
                            )}
                          </div>
                        </Td>
                      </tr>
                    );

                    return (
                      <tr key={a.number} className="hover-row">
                        <Td style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,
                                    color:cfg.color,fontSize:12}}>{a.number}</Td>
                        <Td>{a.name}</Td>
                        <Td style={{color:MUTED,fontSize:12}}>{a.group||"—"}</Td>
                        <Td align="right" style={{fontFamily:"'JetBrains Mono',monospace",
                                                  fontWeight:saldo!==0?600:400,
                                                  color:saldo<0?"#DC2626":saldo>0?"#0F172A":"#CBD5E1"}}>
                          {saldo!==0?fmt(saldo):"—"}
                        </Td>
                        <Td className="no-print" align="right">
                          <div style={{display:"flex",gap:4,justifyContent:"flex-end"}}>
                            <button onClick={()=>startEdit(a)}
                              style={{background:"none",border:"none",color:"#CBD5E1",cursor:"pointer",
                                      fontSize:14,padding:"2px 5px",transition:"color .15s",lineHeight:1}}
                              onMouseEnter={e=>e.currentTarget.style.color="#F59E0B"}
                              onMouseLeave={e=>e.currentTarget.style.color="#CBD5E1"}
                              title="Umbenennen">✏</button>
                            <button onClick={()=>delAccount(a.number)}
                              style={{background:"none",border:"none",color:"#CBD5E1",cursor:"pointer",
                                      fontSize:15,padding:"2px 5px",transition:"color .15s",lineHeight:1}}
                              onMouseEnter={e=>e.currentTarget.style.color="#EF4444"}
                              onMouseLeave={e=>e.currentTarget.style.color="#CBD5E1"}
                              title="Löschen">×</button>
                          </div>
                        </Td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// TAB: HAUPTBUCH
// ═══════════════════════════════════════════════════════════════
function HauptbuchTab({ accounts, entries, year }) {
  const [selAcc, setSelAcc] = useState("");
  const [filterY, setFilterY] = useState(true);

  const account = accounts.find(a=>a.number===selAcc);
  const isDebitNormal = account&&(account.category==="aktiven"||account.category==="aufwand");
  const catColor = {aktiven:"#1D4ED8",passiven:"#15803D",ertrag:"#059669",aufwand:"#DC2626"};

  const rows = useMemo(()=>{
    if(!selAcc) return [];
    let ents = entries.filter(e=>e.debit===selAcc||e.credit===selAcc);
    if(filterY) ents=ents.filter(e=>e.date.startsWith(String(year)));
    ents=ents.sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id);
    let run=0;
    return ents.map(e=>{
      const soll  = e.debit===selAcc  ? Number(e.amount) : null;
      const haben = e.credit===selAcc ? Number(e.amount) : null;
      run += isDebitNormal ? (soll||0)-(haben||0) : (haben||0)-(soll||0);
      const counter = e.debit===selAcc ? e.credit : e.debit;
      return {...e,soll,haben,saldo:run,counter};
    });
  },[entries,selAcc,filterY,year,isDebitNormal]);

  const totSoll  = rows.reduce((s,r)=>s+(r.soll||0),0);
  const totHaben = rows.reduce((s,r)=>s+(r.haben||0),0);
  const saldo    = rows.length>0 ? rows[rows.length-1].saldo : 0;

  // Alle Konten mit Buchungen (wenn kein Konto ausgewählt)
  const allAccountRows = useMemo(()=>{
    if(selAcc) return [];
    let filteredEntries = entries;
    if(filterY) filteredEntries=filteredEntries.filter(e=>e.date.startsWith(String(year)));
    return accounts
      .slice()
      .sort((a,b)=>a.number.localeCompare(b.number))
      .map(acc=>{
        const accNum = acc.number;
        const isDbNormal = acc.category==="aktiven"||acc.category==="aufwand";
        let ents = filteredEntries.filter(e=>e.debit===accNum||e.credit===accNum);
        if(ents.length===0) return null;
        ents = ents.sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id);
        let run=0;
        const accRows = ents.map(e=>{
          const soll  = e.debit===accNum  ? Number(e.amount) : null;
          const haben = e.credit===accNum ? Number(e.amount) : null;
          run += isDbNormal ? (soll||0)-(haben||0) : (haben||0)-(soll||0);
          const counter = e.debit===accNum ? e.credit : e.debit;
          return {...e,soll,haben,saldo:run,counter};
        });
        return {
          account: acc,
          rows: accRows,
          totSoll: accRows.reduce((s,r)=>s+(r.soll||0),0),
          totHaben: accRows.reduce((s,r)=>s+(r.haben||0),0),
          saldo: accRows.length>0 ? accRows[accRows.length-1].saldo : 0
        };
      })
      .filter(Boolean);
  },[accounts,entries,selAcc,filterY,year]);

  return (
    <div>
      <Card title="Konto auswählen">
        <div style={{display:"grid",gridTemplateColumns:"1fr auto auto",gap:12,alignItems:"end"}}>
          <Field label="Konto">
            <AccountSelect accounts={accounts} value={selAcc} onChange={setSelAcc}/>
          </Field>
          <label style={{display:"flex",alignItems:"center",gap:5,fontSize:13,color:"#555",
                         cursor:"pointer",height:38,whiteSpace:"nowrap"}}>
            <input type="checkbox" checked={filterY} onChange={e=>setFilterY(e.target.checked)}/>
            Nur {year}
          </label>
        </div>

        {account && (
          <div style={{display:"flex",gap:20,flexWrap:"wrap",marginTop:12,padding:"10px 12px",
                       background:"#F8FAFC",borderRadius:6,borderLeft:`3px solid ${catColor[account.category]||"#ccc"}`}}>
            <div>
              <div style={{fontSize:10,color:MUTED,marginBottom:1}}>Konto</div>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,
                            color:catColor[account.category]}}>{account.number}</span>
            </div>
            <div>
              <div style={{fontSize:10,color:MUTED,marginBottom:1}}>Bezeichnung</div>
              <span style={{fontWeight:600}}>{account.name}</span>
            </div>
            <div>
              <div style={{fontSize:10,color:MUTED,marginBottom:1}}>Kategorie</div>
              <Badge cat={account.category}/>
            </div>
            <div>
              <div style={{fontSize:10,color:MUTED,marginBottom:1}}>Normalsaldo</div>
              <span style={{fontSize:12,color:"#64748B"}}>
                {isDebitNormal?"Soll (Debit)":"Haben (Kredit)"}
              </span>
            </div>
            <div style={{marginLeft:"auto",textAlign:"right"}}>
              <div style={{fontSize:10,color:MUTED,marginBottom:1}}>Aktueller Saldo</div>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,fontSize:17,
                            color:saldo>=0?"#0F172A":"#DC2626"}}>
                CHF {fmt(saldo)}
              </span>
            </div>
          </div>
        )}
      </Card>

      {selAcc ? (
        <div style={{background:"white",borderRadius:10,border:"1px solid #E2E8F0",
                     overflow:"auto",boxShadow:"0 1px 3px rgba(0,0,0,.05)"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr>
                <Th>Datum</Th>
                <Th>Belegnr.</Th>
                <Th>Buchungstext</Th>
                <Th>Gegenkonto</Th>
                <Th align="right" style={{color:"#1D4ED8"}}>Soll</Th>
                <Th align="right" style={{color:"#059669"}}>Haben</Th>
                <Th align="right">Saldo</Th>
              </tr>
            </thead>
            <tbody>
              {rows.length===0 ? (
                <tr><td colSpan={7} style={{padding:32,textAlign:"center",color:MUTED,fontStyle:"italic"}}>
                  Keine Buchungen für dieses Konto
                </td></tr>
              ) : rows.map(r=>{
                const cAcc = accounts.find(a=>a.number===r.counter);
                return (
                  <tr key={r.id} className="hover-row">
                    <Td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#475569"}}>{r.date}</Td>
                    <Td style={{color:MUTED,fontSize:12}}>{r.reference||"—"}</Td>
                    <Td>{r.description}</Td>
                    <Td style={{fontSize:12}}>
                      <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:600,color:"#64748B"}}>{r.counter}</span>
                      {cAcc&&<span style={{color:MUTED,marginLeft:5}}>{cAcc.name}</span>}
                    </Td>
                    <Td align="right"
                      style={{fontFamily:"'JetBrains Mono',monospace",
                              color:r.soll?"#1D4ED8":"#E2E8F0",fontWeight:r.soll?500:400}}>
                      {r.soll?fmt(r.soll):"—"}
                    </Td>
                    <Td align="right"
                      style={{fontFamily:"'JetBrains Mono',monospace",
                              color:r.haben?"#059669":"#E2E8F0",fontWeight:r.haben?500:400}}>
                      {r.haben?fmt(r.haben):"—"}
                    </Td>
                    <Td align="right"
                      style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:600,
                              color:r.saldo>=0?"#0F172A":"#DC2626"}}>
                      {fmt(r.saldo)}
                    </Td>
                  </tr>
                );
              })}
            </tbody>
            {rows.length>0&&(
              <tfoot>
                <tr style={{background:"#F8FAFC"}}>
                  <td colSpan={4} style={{padding:"10px 12px",fontWeight:700,fontSize:13,
                                          borderTop:"2px solid #E2E8F0"}}>Total</td>
                  <td style={{padding:"10px 12px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",
                               fontWeight:700,color:"#1D4ED8",borderTop:"2px solid #E2E8F0"}}>{fmt(totSoll)}</td>
                  <td style={{padding:"10px 12px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",
                               fontWeight:700,color:"#059669",borderTop:"2px solid #E2E8F0"}}>{fmt(totHaben)}</td>
                  <td style={{padding:"10px 12px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",
                               fontWeight:700,fontSize:14,borderTop:"2px solid #E2E8F0",
                               color:saldo>=0?"#0F172A":"#DC2626"}}>{fmt(saldo)}</td>
                </tr>
              </tfoot>
            )}
          </table>
        </div>
      ) : (
        <div>
          {allAccountRows.length===0 ? (
            <div style={{padding:32,textAlign:"center",color:MUTED,fontStyle:"italic"}}>
              Keine Buchungen vorhanden
            </div>
          ) : allAccountRows.map(g=>(
            <div key={g.account.number} style={{marginBottom:20}}>
              <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",
                           background:"#F8FAFC",borderRadius:"8px 8px 0 0",
                           borderLeft:`4px solid ${catColor[g.account.category]||"#ccc"}`,
                           borderBottom:"1px solid #E2E8F0"}}>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,fontSize:14,
                              color:catColor[g.account.category]||"#333"}}>{g.account.number}</span>
                <span style={{fontWeight:600,fontSize:14}}>{g.account.name}</span>
                <Badge cat={g.account.category}/>
                <span style={{marginLeft:"auto",fontFamily:"'JetBrains Mono',monospace",fontWeight:700,
                              color:g.saldo>=0?"#0F172A":"#DC2626"}}>
                  CHF {fmt(g.saldo)}
                </span>
              </div>
              <div style={{background:"white",borderRadius:"0 0 10px 10px",border:"1px solid #E2E8F0",

// TAB: BILANZ
// ═══════════════════════════════════════════════════════════════
function BilanzTab({ accounts, getSaldo, year }) {
  const aktiven  = accounts.filter(a=>a.category==="aktiven").sort((a,b)=>a.number.localeCompare(b.number));
  const passiven = accounts.filter(a=>a.category==="passiven").sort((a,b)=>a.number.localeCompare(b.number));
  const ertraege = accounts.filter(a=>a.category==="ertrag").reduce((s,a)=>s+getSaldo(a.number,year),0);
  const aufwaende= accounts.filter(a=>a.category==="aufwand").reduce((s,a)=>s+getSaldo(a.number,year),0);
  const jahrRes  = ertraege - aufwaende;

  const totalAkt = aktiven.reduce((s,a)=>s+getSaldo(a.number,year),0);
  const totalPas = passiven.reduce((s,a)=>s+getSaldo(a.number,year),0)+jahrRes;
  const diff = Math.abs(totalAkt-totalPas);
  const balanced = diff < 0.01;

  const aktGroups = [...new Set(aktiven.map(a=>a.group))];
  const pasGroups = [...new Set(passiven.map(a=>a.group))];

  const SideSection = ({ accs, group, color }) => {
    const ga = accs.filter(a=>a.group===group);
    const gt = ga.reduce((s,a)=>s+getSaldo(a.number,year),0);

      <>
        <tr>

                                   color:"#64748B",textTransform:"uppercase",letterSpacing:.5}}>
            {group}
          </td>
        </tr>
        {ga.map(a=>{
          const s=getSaldo(a.number,year);
          return (
            <tr key={a.number} className="hover-row">
              <td style={{padding:"4px 12px 4px 22px",fontSize:11.5,
                          fontFamily:"'JetBrains Mono',monospace",color:MUTED}}>{a.number}</td>
              <td style={{padding:"4px 12px",fontSize:13}}>{a.name}</td>
              <td style={{padding:"4px 12px",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",

                {s!==0?fmt(s):"—"}

            </tr>

        <tr style={{borderBottom:"1px solid #E2E8F0"}}>

  const exportBilanzWord = () => {

      let h = `<table><tr><th colspan="3" style="background:${color}11;color:${color};font-size:11pt">${title}</th></tr>`;

        ga.forEach(a => {
          const s = getSaldo(a.number,year);
          h += `<tr><td class="muted" style="width:60pt">${a.number}</td><td>${a.name}</td><td class="amount">${s!==0?fmt(s):"—"}</td></tr>`;
        });
        h += `<tr><td colspan="2" class="subtotal">Subtotal ${group}</td><td class="amount" style="font-weight:600;color:${color}">${fmt(gt)}</td></tr>`;
      });
      h += `<tr class="total-row" style="color:${color}"><td colspan="2">TOTAL ${title}</td><td class="amount">CHF ${fmt(total)}</td></tr></table>`;
      return h;
    };
    let html = `<h1>Verein Werckmeister</h1><h2>Bilanz per 31. Dezember ${year}</h2>`;
    html += `<table style="border:none"><tr style="vertical-align:top"><td style="border:none;width:50%;padding-right:8pt">`;

    html += `</td><td style="border:none;width:50%;padding-left:8pt">`;

        <div style={{color:"#64748B",fontSize:13,marginTop:3}}>Bilanz per 31. Dezember {year}</div>
        <div style={{color:MUTED,fontSize:11,marginTop:1}}>Schweizer Vereins-Kontenrahmen · Doppelte Buchhaltung</div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        {/* AKTIVEN */}
        <div style={{background:"white",borderRadius:10,border:"1px solid #BFDBFE",overflow:"hidden",
                     boxShadow:"0 1px 4px rgba(29,78,216,.08)"}}>
          <div style={{padding:"11px 14px",background:"#EFF6FF",borderBottom:"1px solid #BFDBFE",
                       fontWeight:800,fontSize:13,color:"#1D4ED8",letterSpacing:.5}}>
            AKTIVEN
          </div>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <tbody>
              {aktGroups.map(g=><SideSection key={g} accs={aktiven} group={g} color="#1D4ED8"/>)}
            </tbody>
            <tfoot>
              <tr style={{background:"#EFF6FF",borderTop:"2px solid #1D4ED8"}}>
                <td colSpan={2} style={{padding:"12px",fontWeight:800,fontSize:14,color:"#1D4ED8"}}>

                     boxShadow:"0 1px 4px rgba(21,128,61,.08)"}}>

                <td colSpan={3} style={{padding:"8px 12px 3px",fontWeight:700,fontSize:10.5,
                                         color:"#64748B",textTransform:"uppercase",letterSpacing:.5}}>

              </tr>
              <tr style={{borderBottom:"1px solid #E2E8F0"}}>
                <td style={{padding:"4px 12px 7px 22px",fontSize:11.5,
                             fontFamily:"'JetBrains Mono',monospace",color:MUTED}}>2900</td>
                <td style={{padding:"4px 12px 7px",fontSize:13}}>
                  {jahrRes>=0?"Jahresgewinn":"Jahresverlust"} {year}
                </td>
                <td style={{padding:"4px 12px 7px",textAlign:"right",

            <tfoot>

                  TOTAL PASSIVEN

      {!balanced&&(

function ErfolgsrechnungTab({ accounts, getSaldo, year }) {
  const erAccs = accounts.filter(a=>a.category==="ertrag" ).sort((a,b)=>a.number.localeCompare(b.number));
  const awAccs = accounts.filter(a=>a.category==="aufwand").sort((a,b)=>a.number.localeCompare(b.number));

  const totAw  = awAccs.reduce((s,a)=>s+getSaldo(a.number,year),0);
  const jahrRes= totEr - totAw;

  const erGroups = [...new Set(erAccs.map(a=>a.group))];
  const awGroups = [...new Set(awAccs.map(a=>a.group))];

  const Section = ({ accs, groups, title, color, bg, border }) => (
    <div style={{background:"white",borderRadius:10,border:`1px solid ${border}`,

      </div>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <tbody>
          {groups.map(group=>{
            const ga = accs.filter(a=>a.group===group);
            const gt = ga.reduce((s,a)=>s+getSaldo(a.number,year),0);
            return (
              <Fragment key={group}>
                <tr>
                  <td colSpan={3} style={{padding:"7px 16px 3px",fontWeight:700,fontSize:10.5,
                                           color:"#64748B",textTransform:"uppercase",letterSpacing:.5}}>
                    {group}
                  </td>
                </tr>
                {ga.map(a=>{
                  const s=getSaldo(a.number,year);
                  return (
                    <tr key={a.number} className="hover-row">
                      <td style={{padding:"4px 16px 4px 26px",fontSize:11.5,
                                  fontFamily:"'JetBrains Mono',monospace",color:MUTED,width:60}}>{a.number}</td>
                      <td style={{padding:"4px 16px",fontSize:13}}>{a.name}</td>
                      <td style={{padding:"4px 16px",textAlign:"right",

                      </td>

                <tr style={{borderBottom:"1px solid #E2E8F0"}}>
                  <td colSpan={2} style={{padding:"3px 16px 7px 26px",
                                          fontSize:11.5,color:MUTED,fontStyle:"italic"}}>
                    Subtotal {group}
                  </td>
                  <td style={{padding:"3px 16px 7px",textAlign:"right",
                               fontFamily:"'JetBrains Mono',monospace",fontSize:13,
                               fontWeight:600,color}}>{fmt(gt)}</td>
                </tr>
              </Fragment>
            );
          })}
        </tbody>
        <tfoot>
          <tr style={{background:bg,borderTop:`2px solid ${color}`}}>
            <td colSpan={2} style={{padding:"12px 16px",fontWeight:800,fontSize:14,color}}>
              TOTAL {title}
            </td>
            <td style={{padding:"12px 16px",textAlign:"right",
                         fontFamily:"'JetBrains Mono',monospace",fontWeight:800,fontSize:15,color}}>
              CHF {fmt(accs===erAccs?totEr:totAw)}
            </td>
          </tr>
        </tfoot>
      </table>
    </div>
  );

  const exportERWord = () => {
    const renderSection = (title, accs, groups, color, total) => {
      let h = `<table><tr><th colspan="3" style="background:${color}11;color:${color};font-size:11pt">${title}</th></tr>`;
      groups.forEach(group => {
        const ga = accs.filter(a=>a.group===group);
        const gt = ga.reduce((s,a)=>s+getSaldo(a.number,year),0);
        h += `<tr class="section-header"><td colspan="3">${group}</td></tr>`;
        ga.forEach(a => {
          const s = getSaldo(a.number,year);
          h += `<tr><td class="muted" style="width:60pt">${a.number}</td><td>${a.name}</td><td class="amount">${s!==0?fmt(s):"—"}</td></tr>`;
        });
        h += `<tr><td colspan="2" class="subtotal">Subtotal ${group}</td><td class="amount" style="font-weight:600;color:${color}">${fmt(gt)}</td></tr>`;
      });
      h += `<tr class="total-row" style="color:${color}"><td colspan="2">TOTAL ${title}</td><td class="amount">CHF ${fmt(total)}</td></tr></table>`;
      return h;
    };
    let html = `<h1>Verein Werckmeister</h1><h2>Erfolgsrechnung ${year} · 1. Januar – 31. Dezember</h2>`;
    html += renderSection("ERTRÄGE", erAccs, erGroups, "#059669", totEr);
    html += renderSection("AUFWÄNDE", awAccs, awGroups, "#DC2626", totAw);
    const resColor = jahrRes>=0 ? "#15803D" : "#DC2626";
    html += `<table><tr class="total-row" style="color:${resColor}"><td colspan="2" style="font-size:12pt">${jahrRes>=0?"JAHRESGEWINN":"JAHRESVERLUST"} ${year}</td>` +

      `<tr><td colspan="3" class="muted" style="font-size:9pt;border:none">Erträge ${fmt(totEr)} – Aufwände ${fmt(totAw)}</td></tr></table>`;
    exportWord(html, `Werckmeister_Erfolgsrechnung_${year}.docx`);
  };

  return (
    <div>
      <div className="no-print" style={{display:"flex",justifyContent:"space-between",
                                        alignItems:"center",marginBottom:16}}>
        <span style={{fontSize:13,color:"#64748B"}}>
          Erfolgsrechnung {year} · 1. Januar – 31. Dezember
        </span>
        <div style={{display:"flex",gap:8}}>
          <button onClick={exportERWord} style={SB}>📄 Word Export</button>
          <button onClick={()=>window.print()} style={SB}>🖨 Drucken / PDF</button>

      </div>

      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{fontWeight:800,fontSize:18,letterSpacing:-.5}}>Verein Werckmeister</div>
        <div style={{color:"#64748B",fontSize:13,marginTop:3}}>Erfolgsrechnung {year}</div>
      </div>

      <div style={{maxWidth:720,margin:"0 auto"}}>
        <Section accs={erAccs} groups={erGroups} title="ERTRÄGE"
          color="#059669" bg="#ECFDF5" border="#A7F3D0"/>
        <Section accs={awAccs} groups={awGroups} title="AUFWÄNDE"
          color="#DC2626" bg="#FEF2F2" border="#FECACA"/>

        {/* Jahresergebnis box */}
        <div style={{
          background: jahrRes>=0?"#F0FDF4":"#FEF2F2",
          border:`2px solid ${jahrRes>=0?"#16A34A":"#DC2626"}`,
          borderRadius:10, padding:"16px 20px",
          display:"flex",justifyContent:"space-between",alignItems:"center",
          boxShadow:"0 2px 8px rgba(0,0,0,.07)",
        }}>
          <div>
            <div style={{fontWeight:800,fontSize:16,
                         color:jahrRes>=0?"#15803D":"#DC2626",letterSpacing:.3}}>
              {jahrRes>=0?"JAHRESGEWINN":"JAHRESVERLUST"} {year}
            </div>
            <div style={{fontSize:12,color:MUTED,marginTop:3}}>
              Erträge {fmt(totEr)} – Aufwände {fmt(totAw)}
            </div>
          </div>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:800,fontSize:22,
                       color:jahrRes>=0?"#15803D":"#DC2626"}}>
            CHF {fmt(Math.abs(jahrRes))}
          </div>
        </div>
      </div>
    </div>
  );
}
